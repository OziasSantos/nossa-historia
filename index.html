<script>
  const heartsContainer = document.getElementById("hearts");

  function criarCoracao() {
    const heart = document.createElement("div");

    heart.classList.add("heart");
    heart.innerHTML = "♥";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 18 + 12 + "px";
    heart.style.animationDuration = Math.random() * 5 + 5 + "s";
    heart.style.opacity = Math.random() * 0.5 + 0.25;

    heartsContainer.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 10000);
  }

  setInterval(criarCoracao, 350);

  function iniciarExperiencia() {
    const message = document.getElementById("message");
    const music = document.getElementById("bg-music");

    message.style.display = "block";

    message.scrollIntoView({
      behavior: "smooth"
    });

    music.play().catch(() => {
      console.log("Autoplay bloqueado");
    });
  }

  // CONTADOR

  const inicio = new Date(2025, 4, 7); // mês começa em 0

  const hoje = new Date();

  const diferenca = hoje - inicio;

  const dias = Math.floor(
    diferenca / (1000 * 60 * 60 * 24)
  );

  document.getElementById("dias").innerText = dias;

  // REVEAL AO SCROLL

  const reveals = document.querySelectorAll(".reveal");

  function revelarMensagens() {
    reveals.forEach((item) => {
      const top = item.getBoundingClientRect().top;

      if (top < window.innerHeight - 100) {
        item.classList.add("show");
      }
    });
  }

  window.addEventListener("scroll", revelarMensagens);

  revelarMensagens();
</script>
