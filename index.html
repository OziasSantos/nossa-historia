<audio id="bg-music" loop>
  <source src="until-i-found-you.mp3" type="audio/mpeg">
</audio>

<script>
  const heartsContainer = document.getElementById("hearts");

  function criarCoracao() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "♥";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 18 + 12 + "px";
    heart.style.animationDuration = Math.random() * 5 + 5 + "s";
    heart.style.opacity = Math.random() * 0.5 + 0.25;

    heartsContainer.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 10000);
  }

  setInterval(criarCoracao, 350);

  function iniciarExperiencia() {
    const message = document.getElementById("message");
    const music = document.getElementById("bg-music");

    if (message) {
      message.style.display = "block";
      message.scrollIntoView({ behavior: "smooth" });
    }

    if (music) {
      music.play().catch(() => {
        console.log("Música bloqueada pelo navegador");
      });
    }
  }

  const inicio = new Date(2025, 4, 7);

  function atualizarContador() {
    const campoDias = document.getElementById("dias");

    if (!campoDias) return;

    const hoje = new Date();
    const diferenca = hoje - inicio;
    const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));

    campoDias.innerText = dias;
  }

  atualizarContador();

  const reveals = document.querySelectorAll(".reveal");

  function revelarMensagens() {
    reveals.forEach((item) => {
      const top = item.getBoundingClientRect().top;

      if (top < window.innerHeight - 100) {
        item.classList.add("show");
      }
    });
  }

  window.addEventListener("scroll", revelarMensagens);
  revelarMensagens();
</script>
